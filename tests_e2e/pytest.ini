[pytest]
testpaths = tests_e2e
pythonpath = .
markers =
    tier1: Tier 1 Feature Coverage (basic functionality)
    tier2: Tier 2 Boundary & Corner Cases (validation, overflows, empty inputs)
    tier3: Tier 3 Cross-Feature Combinations (data flows and state consistency)
    tier4: Tier 4 Real-World Workloads (comprehensive user journeys)
    ocr: Tests related to OCR invoice analysis
    calculator: Tests related to carbon calculation and scoring
    chatbot: Tests related to RAG AI chatbot queries
    marketplace: Tests related to project marketplace
    reports: Tests related to PDF & Excel export reports
filterwarnings =
    ignore::DeprecationWarning
